name: build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0.x # The .NET SDK version to use

jobs:
  build-and-test:
    name: build-and-test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET Core App
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-restore --blame-hang-timeout 1m

  pack-and-publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      Solution_Name: ./src/ILAssembler/ILAssembler.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET Core App
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Dependencies
        run: dotnet restore $Solution_Name

      - name: Pack
        run: dotnet pack $Solution_Name --no-restore --version-suffix build.${{ github.run_number }}.${{ github.run_attempt }} -o "nugets"

      - name: Publish
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        run: dotnet nuget push ./nugets/*.nupkg --source $NUGET_SOURCE --skip-duplicate --api-key $MYGET_KEY
        env:
          NUGET_SOURCE: https://www.myget.org/F/where/api/v3/index.json
          MYGET_KEY: ${{ secrets.MYGET_KEY }}

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: Nuget Package
          path: nugets/**
